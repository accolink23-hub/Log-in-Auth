<table id="bookingsTable">
  <thead>
    <tr>
      <th>Customer</th>
      <th>Source</th>
      <th>Status</th>
      <th>Date</th>
      <th>Update Status</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script type="module">
import { supabase } from './supabaseClient.js';

async function loadBookings() {
  const user = supabase.auth.user(); // logged-in guesthouse owner
  if (!user) return;

  const { data: profile } = await supabase
    .from('profiles')
    .select('id')
    .eq('id', user.id)
    .single();

  const { data: bookings, error } = await supabase
    .from('bookings')
    .select('id, customer_name, booking_source, status, created_at')
    .eq('guesthouse_id', profile.id)
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const tbody = document.querySelector('#bookingsTable tbody');
  tbody.innerHTML = ''; // clear previous rows

  bookings.forEach(b => {
    const tr = document.createElement('tr');

    const date = new Date(b.created_at).toLocaleDateString();

    tr.innerHTML = `
      <td>${b.customer_name}</td>
      <td>${b.booking_source}</td>
      <td>${b.status}</td>
      <td>${date}</td>
      <td>
        <button onclick="updateStatus('${b.id}', 'Successful')">Successful</button>
        <button onclick="updateStatus('${b.id}', 'Pending')">Pending</button>
        <button onclick="updateStatus('${b.id}', 'Unsuccessful')">Unsuccessful</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// Update status in Supabase
window.updateStatus = async function(bookingId, newStatus) {
  const { data, error } = await supabase
    .from('bookings')
    .update({ status: newStatus })
    .eq('id', bookingId);

  if (error) {
    alert('Error updating status');
    console.error(error);
  } else {
    loadBookings(); // reload table
  }
};

loadBookings(); // initial load
</script>
